<!DOCTYPE html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>PalachinqO — Palačinke • Zagreb</title>
    <meta name="description" content="PalachinqO – domaće palačinke svježe pripremljene na Britancu u srcu Zagreba. Pon–Sub 17:00–23:00. Ilica 75, Zagreb." />
    <meta name="keywords" content="palačinke zagreb, palačinkarnica zagreb, palacinke zagreb, britanac palačinke, slatke palačinke, crepes zagreb, PalachinqO" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://palachinqo.hr/" />
    <meta name="theme-color" content="#fece05" />

    <!-- Open Graph -->
    <meta property="og:type" content="restaurant" />
    <meta property="og:site_name" content="PalachinqO" />
    <meta property="og:title" content="PalachinqO — Palačinke • Zagreb" />
    <meta property="og:description" content="Domaće palačinke, svježe pripremljene na Britancu u Zagrebu. Ilica 75 · 17:00–23:00" />
    <meta property="og:url" content="https://palachinqo.hr/" />
    <meta property="og:image" content="https://palachinqo.hr/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="hr_HR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PalachinqO — Palačinke • Zagreb" />
    <meta name="twitter:description" content="Domaće palačinke, svježe pripremljene na Britancu u Zagrebu." />
    <meta name="twitter:image" content="https://palachinqo.hr/og-image.jpg" />

    <!-- Structured data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "PalachinqO",
      "url": "https://palachinqo.hr/",
      "telephone": "+385924610263",
      "servesCuisine": ["Palačinke", "Crepes"],
      "priceRange": "€",
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
          "opens": "15:00",
          "closes": "23:00"
        }
      ],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Ilica 75",
        "addressLocality": "Zagreb",
        "postalCode": "10000",
        "addressCountry": "HR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 45.8124,
        "longitude": 15.9619
      }
    }
    </script>

    <!-- Fonts: preconnect + self-hosted swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- CSS non-blocking strategy: will be injected by Vite, but we prepare for async loading -->
    <script>
      // Disable render-blocking CSS via media query trick
      // This allows the main thread to paint while css loads
      document.addEventListener('DOMContentLoaded', function() {
        // CSS is ready, no additional action needed
      }, false);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
